<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心情語一覧表（印刷用）</title>
<style>
:root {
  --primary: #2563eb;
  --primary-light: #dbeafe;
  --level1: #22c55e;
  --level2: #f59e0b;
  --level3: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: "Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif; color:#1e293b; font-size:10pt; line-height:1.5; }

/* Screen styles */
@media screen {
  body { background:#f0f4f8; padding:20px; }
  .page-header { background:var(--primary); color:#fff; padding:16px 24px; border-radius:12px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
  .page-header h1 { font-size:1.3rem; }
  .controls { display:flex; gap:8px; align-items:center; }
  .controls select, .controls button { padding:6px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.2); color:#fff; font-size:0.85rem; cursor:pointer; }
  .controls button:hover { background:rgba(255,255,255,0.3); }
  .print-btn { background:rgba(255,255,255,0.9) !important; color:var(--primary) !important; font-weight:bold; }
}

/* Shared table styles */
.scene-section { margin-bottom:16px; }
.scene-title { font-size:11pt; font-weight:bold; color:var(--primary); padding:4px 8px; border-bottom:2px solid var(--primary); margin-bottom:6px; }
table { width:100%; border-collapse:collapse; font-size:9pt; }
th { background:var(--primary-light); padding:4px 6px; text-align:left; font-size:8pt; color:#1d4ed8; border:1px solid #cbd5e1; }
td { padding:4px 6px; border:1px solid #e2e8f0; vertical-align:top; }
.lv { display:inline-block; padding:1px 6px; border-radius:8px; font-size:7pt; font-weight:bold; color:#fff; }
.lv1 { background:var(--level1); }
.lv2 { background:var(--level2); }
.lv3 { background:var(--level3); }
.word-col { font-weight:bold; white-space:nowrap; }
.reading-col { color:#64748b; font-size:8pt; white-space:nowrap; }
.example-col { font-size:8pt; color:#64748b; }

/* Print styles */
@media print {
  body { padding:0; background:#fff; }
  .page-header { display:none; }
  .scene-section { page-break-inside:avoid; }
  .scene-title { color:#000; border-color:#000; }
  table { font-size:8pt; }
  th { background:#eee !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .lv { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  @page { margin:12mm 10mm; size:A4; }
}
</style>
</head>
<body>

</div>

<div id="content"></div>

function filterList() {
  const level = document.getElementById('levelFilter').value;
  render(level);
}

function render(levelFilter) {
  const container = document.getElementById('content');
  let html = '';
  SCENES.forEach(scene => {
    let words = DATA.filter(w => w.scene === scene.id);
    if (levelFilter && levelFilter !== 'all') words = words.filter(w => w.level == levelFilter);
    if (!words.length) return;
    words.sort((a,b) => a.level - b.level);
    html += `<div class="scene-section"><div class="scene-title">${scene.name}</div>`;
    html += '<table><thead><tr><th style="width:45px">Lv</th><th style="width:80px">心情語</th><th style="width:70px">読み</th><th>意味</th><th>用例</th></tr></thead><tbody>';
    words.forEach(w => {
      html += `<tr><td><span class="lv lv${w.level}">${'★'.repeat(w.level)}</span></td><td class="word-col">${w.word}</td><td class="reading-col">${w.reading}</td><td>${w.meaning}</td><td class="example-col">${w.example}</td></tr>`;
    });
    html += '</tbody></table></div>';
  });
  container.innerHTML = html;
}

render('all');
</script>
